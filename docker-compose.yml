version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shopping_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shopping_development
      MYSQL_USER: shopping_user
      MYSQL_PASSWORD: shopping_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - shopping_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shopping_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shopping_network

  rails_api:
    build:
      context: ./user-api
      dockerfile: Dockerfile
    container_name: shopping_rails_api
    environment:
      DATABASE_URL: mysql2://shopping_user:shopping_password@mysql:3306/shopping_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
    ports:
      - "3001:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - shopping_network
    command: >
      sh -c "
        bundle exec rails db:migrate 2>/dev/null || bundle exec rails db:migrate &&
        bundle exec rails server -b 0.0.0.0 -p 3000
      "

  laravel_admin:
    build:
      context: ./admin-api
      dockerfile: Dockerfile
    container_name: shopping_laravel_admin
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: shopping_development
      DB_USERNAME: shopping_user
      DB_PASSWORD: shopping_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ENV: local
      APP_DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./admin-api:/var/www/html
      - laravel_vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rails_api:
        condition: service_started
    networks:
      - shopping_network
    command: >
      sh -c "
        cp -n .env.example .env 2>/dev/null || true &&
        mkdir -p bootstrap/cache storage/framework/{sessions,views,cache} &&
        chmod -R 775 bootstrap/cache storage &&
        composer install --no-scripts &&
        php artisan package:discover --ansi &&
        php artisan key:generate --force &&
        sleep 5 &&
        php database/fix_schema.php || true &&
        php artisan migrate --force &&
        php artisan db:seed --force || true &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: shopping_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_USER_API_URL=http://localhost:3001
      - REACT_APP_ADMIN_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - shopping_network

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: shopping_scheduler
    environment:
      DATABASE_URL: mysql2://shopping_user:shopping_password@mysql:3306/shopping_development
    volumes:
      - ./scheduler:/app
      - ./exports:/app/exports
    depends_on:
      - mysql
    networks:
      - shopping_network

volumes:
  mysql_data:
  redis_data:
  rails_gems:
  laravel_vendor:

networks:
  shopping_network:
    driver: bridge
